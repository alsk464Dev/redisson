spring:
  application:
    name: redisson
  datasource:
    # 메모리에서 동작하는 H2 데이터베이스 설정 (매번 실행할 때마다 초기화됨)
    url: jdbc:h2:mem:votedb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create # 애플리케이션 시작 시 엔티티 기반으로 테이블 자동 생성
    show-sql: true
    properties:
      hibernate:
        format_sql: true
